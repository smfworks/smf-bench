# Context Length Scaling Tests (6 sub-tests: 100 → 128K tokens)
# Ported from qwen3-6-35b-full-65test-benchmark.py Dimension 6
# Evaluator: performance (records throughput and correctness; no pass/fail)
# Measures: input prompt tokens, output tokens, wall time, throughput, correctness
# Correctness check: answer must contain "56" (7 × 8)

- id: perf_context_100
  name: "Context @ ~100 tokens"
  category: context_scaling
  dimension: performance
  requires_modalities: [text]
  requires_capabilities: [reasoning, context_long]
  evaluator: performance
  prompt_template: context_scaling
  target_tokens: 100
  base_prompt: "What is 7 × 8? Answer with just the number."
  expected_correct: "56"
  max_tokens: 200
  temperature: 0.3
  metadata:
    measures: [prompt_tokens, output_tokens, wall_time, throughput, correct]

