# Latency & Throughput Tests (5 sub-tests)
# Ported from qwen3-6-35b-full-65test-benchmark.py Dimension 3
# Evaluator: performance (records throughput; no pass/fail)
# Measures: tokens generated, wall time, throughput (tok/s)

- id: perf_latency_64tok
  name: "Latency @ 64 tokens"
  category: latency_throughput
  dimension: performance
  requires_modalities: [text]
  requires_capabilities: [reasoning]
  evaluator: performance
  prompt: "Write a detailed essay about the history of computing, from Babbage to modern AI."
  max_tokens: 64
  temperature: 0.7
  metadata:
    measures: [wall_time, tokens_generated, throughput]

