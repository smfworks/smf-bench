# Vision/Image Understanding Tests (20 tests)
# Ported from qwen3-6-35b-full-65test-benchmark.py Dimension 1
# Images are procedurally generated by the test harness (see image_generators below)
# Evaluator: text_contains (keyword-based scoring against expected answer)

# Image generators used by these tests:
#   idx 0: gen_color_grid — 4x4 grid with random colors (seed=42)
#   idx 1: gen_text_image — 4 lines of text (fox sentence, Hermes version, API key, date/temp)
#   idx 2: gen_bar_chart — Quarterly Revenue bar chart (Q1=$120K, Q2=$185K, Q3=$95K, Q4=$210K)
#   idx 3: gen_code_screenshot — Python fibonacci code screenshot
#   idx 4: gen_math_equation — Quadratic equation 3x²-12x+9=0
#   idx 5: gen_scene_image — Scene with sun, house, tree, grass
#   idx 6: gen_number_sequence — "2, 6, 12, 20, 30, ?" (answer: 42)
#   idx 7: gen_two_images_A — red square labeled "Image A"
#   idx 8: gen_two_images_B — blue circle labeled "Image B"

# ============================================================
# Section 1: Single Image (5 tests)
# ============================================================

- id: vision_1a_describe
  name: "1a — Describe image"
  category: vision
  dimension: quality
  requires_modalities: [text, image_in]
  requires_capabilities: [vision]
  evaluator: text_contains
  prompt: "Describe what you see in this image in detail. What colors and shapes are present?"
  image_generator: gen_color_grid
  expected_keywords: [red, blue, green, yellow, purple, orange, cyan, magenta, grid, square]
  min_matches: 3
  max_tokens: 512
  temperature: 0.3

- id: vision_1b_count
  name: "1b — Count objects"
  category: vision
  dimension: quality
  requires_modalities: [text, image_in]
  requires_capabilities: [vision]
  evaluator: text_contains
  prompt: "How many colored squares are in this image? Count them carefully."
  image_generator: gen_color_grid
  expected_keywords: ["16"]
  min_matches: 1
  max_tokens: 256
  temperature: 0.3

- id: vision_1c_colors
  name: "1c — Identify colors"
  category: vision
  dimension: quality
  requires_modalities: [text, image_in]
  requires_capabilities: [vision]
  evaluator: text_contains
  prompt: "List all the unique colors you can see in this grid image."
  image_generator: gen_color_grid
  expected_keywords: [red, blue, green, yellow, purple, orange, cyan, magenta]
  min_matches: 5
  max_tokens: 256
  temperature: 0.3

- id: vision_1d_scene
  name: "1d — Scene description"
  category: vision
  dimension: quality
  requires_modalities: [text, image_in]
  requires_capabilities: [vision]
  evaluator: text_contains
  prompt: "Describe this scene in detail. What objects do you see, their positions, and colors?"
  image_generator: gen_scene_image
  expected_keywords: [sun, house, tree, grass, red, brown, green, yellow]
  min_matches: 4
  max_tokens: 512
  temperature: 0.3

- id: vision_1e_spatial
  name: "1e — Spatial reasoning"
  category: vision
  dimension: quality
  requires_modalities: [text, image_in]
  requires_capabilities: [vision]
  evaluator: text_contains
  prompt: "In this image, what is the position of the sun relative to the house? Is the tree to the left or right of the house?"
  image_generator: gen_scene_image
  expected_keywords: [right, left, top, above]
  min_matches: 2
  max_tokens: 256
  temperature: 0.3

# ============================================================
# Section 2: Multiple Images (2 tests)
# ============================================================

- id: vision_2a_compare
  name: "2a — Compare two images"
  category: vision
  dimension: quality
  requires_modalities: [text, image_in]
  requires_capabilities: [vision]
  evaluator: text_contains
  prompt: "I'm showing you two images. Describe the differences between Image A and Image B. What shape and color is each?"
  image_generator: gen_two_images
  expected_keywords: [red, square, blue, circle, image]
  min_matches: 3
  max_tokens: 512
  temperature: 0.3

- id: vision_2b_circle
  name: "2b — Which has circle?"
  category: vision
  dimension: quality
  requires_modalities: [text, image_in]
  requires_capabilities: [vision]
  evaluator: text_contains
  prompt: "Between these two images, which one contains a circle? Answer with 'Image A' or 'Image B'."
  image_generator: gen_two_images
  expected_keywords: ["Image B"]
  min_matches: 1
  max_tokens: 128
  temperature: 0.3

