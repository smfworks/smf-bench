# Video Understanding Tests (17 tests)
# Ported from qwen3-6-35b-full-65test-benchmark.py Dimension 2
# Videos are loaded from VIDEO_DIR (default: /home/mikesai1/NemoVault/queries/multimodal-test-images)
# Evaluator: text_contains (keyword-based scoring against expected answer)
#
# Video files required:
#   09-bouncing-ball.mp4 — red ball bouncing on blue background
#   10-shapes-motion.mp4 — green square (horizontal), yellow triangle (vertical), blue circle (pulsing)
#   11-color-cycle.mp4 — cycling colors: red, green, blue, cyan, magenta, yellow

# ============================================================
# Category 1: Video Description (4 tests)
# ============================================================

- id: video_1a_describe
  name: "V1a — Describe video"
  category: video
  dimension: quality
  requires_modalities: [text, video_in]
  requires_capabilities: [video]
  evaluator: text_contains
  prompt: "Describe what happens in this video. What objects do you see and how do they move?"
  video_file: 09-bouncing-ball.mp4
  expected_keywords: [red, ball, circle, bouncing, blue, background]
  min_matches: 3
  max_tokens: 300
  temperature: 0.3

- id: video_1b_colors
  name: "V1b — Identify colors"
  category: video
  dimension: quality
  requires_modalities: [text, video_in]
  requires_capabilities: [video]
  evaluator: text_contains
  prompt: "What color is the background in this video? What color is the moving object?"
  video_file: 09-bouncing-ball.mp4
  expected_keywords: [blue, red]
  min_matches: 2
  max_tokens: 100
  temperature: 0.3

- id: video_1c_shapes
  name: "V1c — List shapes"
  category: video
  dimension: quality
  requires_modalities: [text, video_in]
  requires_capabilities: [video]
  evaluator: text_contains
  prompt: "List all the shapes you see in this video and describe each one's color and movement pattern."
  video_file: 10-shapes-motion.mp4
  expected_keywords: [green, square, horizontal, yellow, triangle, vertical, blue, circle, pulsing]
  min_matches: 4
  max_tokens: 300
  temperature: 0.3

- id: video_1d_color_order
  name: "V1d — Color cycle order"
  category: video
  dimension: quality
  requires_modalities: [text, video_in]
  requires_capabilities: [video]
  evaluator: text_contains
  prompt: "What colors appear in this video and in what order?"
  video_file: 11-color-cycle.mp4
  expected_keywords: [red, green, blue, cyan, magenta, yellow]
  min_matches: 4
  max_tokens: 200
  temperature: 0.3

