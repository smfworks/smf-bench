  expected_keywords: [square, horizontal, triangle, vertical, circle, size]
  min_matches: 3
  max_tokens: 200
  temperature: 0.3

- id: video_2c_predict
  name: "V2c — Predict next frame"
  category: video
  dimension: quality
  requires_modalities: [text, video_in]
  requires_capabilities: [video]
  evaluator: text_contains
