id: av2-11-app-counter
name: Counter app (HTML)
category: agentic
dimension: quality
kind: app
difficulty: hard
requires_modalities:
- text
requires_capabilities:
- tool_calling
- tool_calling
evaluator: agentic_file_check
prompt: 'You are working in a sandbox: the CURRENT DIRECTORY is your workdir. Use your file/shell tools directly — do not ask questions, act autonomously. Write a self-contained single HTML file named counter.html
  in the current directory (all CSS and JS inline, no external resources). It must implement an interactive counter app: an element with id "count" that displays the current value starting at 0, and three
  buttons with ids "inc", "dec" and "reset". Wire click handlers with addEventListener so "inc" increases the value by 1, "dec" decreases it by 1, and "reset" sets it back to 0, updating the #count element
  each time. Reply DONE when counter.html is written.'
setup_files: {}
success:
  files:
    counter.html:
      contains:
      - <script
      - id="count"
      - id="inc"
      - id="dec"
      - id="reset"
      - addEventListener
      - getElementById
  answer_contains:
  - done
timeout_s: 300
