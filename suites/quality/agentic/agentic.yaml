# Agentic Tasks (16 tasks) — extracted from Aeon-Bench-Pod (MIT License, Copyright 2026 AEON-7)
# These tasks require a harness with file/shell tools (e.g., Hermes, OpenClaw, OpenCode).
# Scoring is based on OBSERVABLE OUTCOMES: files produced + final answer text.
# Kinds: file_io (10), app (2), game (2), animation (2)
# Evaluator: agentic_file_check — checks file contents + answer text against success spec

id: av2-01-compute-write
name: Compute and write to file
category: agentic
dimension: quality
kind: file_io
difficulty: medium
requires_modalities:
- text
requires_capabilities:
- tool_calling
- tool_calling
evaluator: agentic_file_check
prompt: 'You are working in a sandbox: the CURRENT DIRECTORY is your workdir. Use your file/shell tools directly — do not ask questions, act autonomously. Compute 17 * 23 + 9. Write ONLY the resulting number
  to a file named result.txt in the current directory, then state the number in your final answer.'
setup_files: {}
success:
  files:
    result.txt:
      contains:
      - '400'
  answer_contains:
  - '400'
timeout_s: 180
