id: av2-05-script-and-output
name: Write script, run, save output
category: agentic
dimension: quality
kind: file_io
difficulty: medium
requires_modalities:
- text
requires_capabilities:
- tool_calling
- tool_calling
evaluator: agentic_file_check
prompt: 'You are working in a sandbox: the CURRENT DIRECTORY is your workdir. Use your file/shell tools directly — do not ask questions, act autonomously. Write a Python script named fib.py in the current
  directory that prints the first 8 Fibonacci numbers starting from 0 and 1, on ONE line, separated by commas (i.e. it prints: 0,1,1,2,3,5,8,13). Run the script and save its exact output to a file named
  fib_out.txt. Then state the last number of the sequence in your final answer.'
setup_files: {}
success:
  files:
    fib.py:
      contains:
      - print
    fib_out.txt:
      contains:
      - 0,1,1,2,3,5,8,13
  answer_contains:
  - '13'
timeout_s: 240
---
id: av2-06-bugfix-run
name: Fix bug and run script
category: agentic
dimension: quality
kind: file_io
difficulty: medium
requires_modalities:
- text
requires_capabilities:
- tool_calling
- tool_calling
evaluator: agentic_file_check
prompt: 'You are working in a sandbox: the CURRENT DIRECTORY is your workdir. Use your file/shell tools directly — do not ask questions, act autonomously. The script buggy.py in the current directory is
  supposed to print the SUM of the list [3, 5, 7, 11] (which is 26) but it has a one-line bug. Fix the bug by editing buggy.py in place, run the fixed script, and write its exact output to a file named
  out.txt. Then state the printed number in your final answer.'
setup_files:
  buggy.py: "def total(nums):\n    s = 0\n    for n in nums:\n        s -= n\n    return s\n\nif __name__ == \"__main__\":\n    print(total([3, 5, 7, 11]))\n"
success:
  files:
    buggy.py:
      contains:
      - +
    out.txt:
      equals: '26'
  answer_contains:
  - '26'
timeout_s: 240
