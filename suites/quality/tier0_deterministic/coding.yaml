metadata:
  eval_type: unit_test
  language: python
prompt: 'Write a Python function with the exact signature:


  def max_weight_schedule(jobs):


  jobs is a list of (start, end, weight) tuples of ints with start < end and weight
  > 0. Choose a subset of the jobs, no two of which overlap in time, maximizing the
  total weight; return that maximum total weight as an int (0 for an empty list).
  A job ending at time t is COMPATIBLE with a job starting at time t (touching endpoints
  do not count as overlap). Duplicate and fully-contained jobs may appear. jobs can
  contain up to 2*10^5 entries, so an O(n^2) approach may time out — aim for O(n log
  n) (e.g. sort plus binary search DP). Use only the Python standard library. Output
  only a single Python code block.'
