  def mod_floor_sum(n: int) -> int


  Return the EXACT value of sum(n mod i for i in range(1, n + 1)) - the sum of the
  remainders of n divided by every integer from 1 to n.


  Constraints: 1 <= n <= 10**12. A direct loop over 10**12 terms is impossible; exploit
  the fact that floor(n / i) takes only O(sqrt(n)) distinct values and sum each block
  with an arithmetic-series formula. Watch the block boundaries - off-by-one errors
  in the block ranges are the classic failure mode. The result is an exact (large)
  integer, no modulus.


  Examples: mod_floor_sum(1) == 0; mod_floor_sum(6) == 3. Use only the Python standard
  library. The grader appends hidden asserts to your code and runs everything with
