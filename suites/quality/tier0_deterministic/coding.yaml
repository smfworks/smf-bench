  \ _OPS)\nassert len(_R) == 249737\nassert sum(_R) == 19302621758"
metadata:
  eval_type: unit_test
  language: python
prompt: 'Write a Python function with the exact signature:


  def lru_trace(capacity, ops):


  Simulate a Least-Recently-Used (LRU) cache with the given positive int capacity.
  ops is a list of operations, each either ("put", key, value) or ("get", key), with
  int keys and values. Semantics: "put" inserts or updates key -> value and makes
  that key the MOST recently used; if the insert pushes the cache above capacity,
  evict the LEAST recently used key first. "get" returns the value if the key is present
  (and makes that key the MOST recently used) or -1 if absent — a failed get must
  NOT change any recency state. Return the list of results of the "get" operations,
  in order. Every operation must run in O(1) average time — capacity can be tens of
  thousands and ops can number in the hundreds of thousands, so an implementation
  that scans or does O(n) list surgery per operation will time out. Use only the Python
  standard library. Output only a single Python code block.'
---
