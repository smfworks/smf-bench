prompt: 'Write a Python function with the exact signature:


  def kth_subset_xor(nums: list[int], k: int) -> int


  Let S be the set of DISTINCT values obtainable by XOR-ing together the elements
  of some subset of nums (the empty subset gives 0, so 0 is always in S). Sort S ascending;
  return its k-th smallest element (1-indexed).


  Constraints: 0 <= len(nums) <= 50000; 0 <= nums[i] < 2**60; 1 <= k <= |S|. |S| is
  always a power of two and can be as large as 2**60, so enumerating S is impossible
  - build a linear basis of the numbers over GF(2), put it in reduced row-echelon
  form, and map the bits of k-1 onto the reduced basis vectors.


  Examples: kth_subset_xor([1, 2], 3) == 2 (S = {0, 1, 2, 3}); kth_subset_xor([5,
  5, 5], 2) == 5 (S = {0, 5}); kth_subset_xor([], 1) == 0. Use only the Python standard
  library. The grader appends hidden asserts to your code and runs everything with
