  language: python
prompt: 'Write a Python function eval_expr(s: str) -> int that evaluates an arithmetic
  expression over arbitrary-precision integers. Tokens: non-negative decimal integer
  literals, the binary operators + - * @ ^, parentheses ( ), and optional spaces which
  may appear between any two tokens. There are NO unary operators; literals are never
  negative, though intermediate and final values may become negative through subtraction.
  Semantics and precedence: ''+'' and ''-'' are ordinary addition and subtraction,
  precedence 1, left-associative. ''*'' is ordinary multiplication, precedence 2,
  left-associative. ''@'' is a custom operator defined by a @ b = a*b + a + b, ALSO
  precedence 2 and left-associative, so chains mixing ''*'' and ''@'' group strictly
  left to right. ''^'' is integer exponentiation, precedence 3 (the highest), RIGHT-associative;
  every exponent is guaranteed to evaluate to a non-negative integer. Parentheses
  override all precedence. The input is always a syntactically valid expression. Examples:
  eval_expr(''2@3'') == 11 and eval_expr(''2^3^2'') == 512. Use only the Python standard
  library. Output only a single Python code block.'
---
