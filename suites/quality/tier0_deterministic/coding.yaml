expected: 'assert cheapest_route(5, [(0,1,7),(0,2,3),(2,1,1),(1,3,2),(2,3,9),(3,4,4),(1,4,10)],
  0, 4) == 10

  assert cheapest_route(5, [(0,1,7),(0,2,3),(2,1,1),(1,3,2),(2,3,9),(3,4,4),(1,4,10)],
  4, 0) == -1

  assert cheapest_route(3, [(0,1,5),(0,1,2),(1,2,2)], 0, 2) == 4

  assert cheapest_route(4, [(0,1,1),(1,2,1)], 0, 3) == -1

  assert cheapest_route(2, [(0,1,0),(1,0,0)], 0, 1) == 0

  assert cheapest_route(1, [], 0, 0) == 0

  assert cheapest_route(4, [(0,1,4),(0,2,1),(2,1,1),(1,3,1),(2,3,6),(0,3,7)], 0, 3)
  == 3

  import random

  random.seed(20260704)

  _N = 4000

  _E = [(i, i + 1, 3) for i in range(_N - 1)]

  _E += [(random.randrange(_N), random.randrange(_N), random.randrange(50000, 99999))
  for _ in range(90000)]

  random.shuffle(_E)

  assert cheapest_route(_N, _E, 0, _N - 1) == 3 * (_N - 1)'
metadata:
  eval_type: unit_test
  language: python
prompt: 'Write a Python function with the exact signature:


  def cheapest_route(n, edges, src, dst):


  There are n nodes numbered 0..n-1. edges is a list of DIRECTED edges (u, v, w) meaning
  you can travel from u to v at cost w, where w is an int >= 0 (zero-cost edges are
  allowed, and parallel edges between the same pair may appear). src and dst are node
  ids. Return the minimum total cost of any path from src to dst as an int, or -1
  if dst is unreachable from src. If src == dst the answer is 0. The graph can have
  up to 10^5 edges, so your solution must be efficiently implemented (e.g. Dijkstra
  with a heap — an O(n * edges) approach may time out). Use only the Python standard
  library. Output only a single Python code block.'
---
