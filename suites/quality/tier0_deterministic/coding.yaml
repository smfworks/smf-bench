id: v3.coding.easy.01
name: v3.coding.easy.01
category: coding
dimension: quality
requires_modalities:
- text
requires_capabilities:
- reasoning
max_tokens: 4096
temperature: 0.3
evaluator: programmatic
expected: 'assert clamp_all([3, -7, 12, 5], 0, 10) == [3, 0, 10, 5]

  assert clamp_all([], -5, 5) == []

  assert clamp_all([4, 4, 4], 4, 4) == [4, 4, 4]

  assert clamp_all([-2, -1, 0, 1, 2], -1, 1) == [-1, -1, 0, 1, 1]

  assert clamp_all([100], -50, 50) == [50]

  assert clamp_all([0.5, 2.5], 1, 2) == [1, 2]

  _orig = [9, -9, 3]

  _out = clamp_all(_orig, 0, 5)

  assert _orig == [9, -9, 3], ''input list was mutated''

  assert _out == [5, 0, 3]'
metadata:
  eval_type: unit_test
  language: python
prompt: 'Write a Python function with the exact signature:


  def clamp_all(nums, lo, hi):


  It takes a list of numbers `nums` and two bounds `lo <= hi`, and returns a NEW list
  where every element is clamped into the closed interval [lo, hi]: values below `lo`
  become `lo`, values above `hi` become `hi`, and values already inside the interval
  are kept unchanged. The original list must not be modified, order is preserved,
  and an empty input list returns an empty list. Elements may be ints or floats. Use
  only the Python standard library. Output only a single Python code block containing
  the function.'
---
