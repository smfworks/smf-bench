  language: python
prompt: 'Write a Python function with the exact signature:


  def eval_expr(s):


  s is a string containing a valid arithmetic expression made of: non-negative integer
  literals, the binary operators + - * /, unary minus (which may be repeated, e.g.
  "--6" is 6, and may apply to a parenthesized group), parentheses, and arbitrary
  spaces. Precedence is standard: unary minus binds tightest, then * and / (left-associative),
  then + and - (left-associative). Division / is INTEGER division that truncates toward
  ZERO (so eval_expr("-7/2") == -3 and eval_expr("8/-3") == -2 — note this differs
  from Python''s // floor division for negative results). Division by zero will not
  occur. Return the resulting int. Use only the Python standard library and do NOT
  call eval or exec. Output only a single Python code block.'
