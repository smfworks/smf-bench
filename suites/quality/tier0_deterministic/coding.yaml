  ,3,30),(\"get\",2),(\"put\",4,40),(\"get\",1),(\"get\",3),(\"get\",4)]) == [10,\
  \ -1, -1, 30, 40]\nassert lru_trace(1, [(\"put\",7,70),(\"get\",7),(\"put\",8,80),(\"\
  get\",7),(\"get\",8)]) == [70, -1, 80]\nassert lru_trace(3, [(\"put\",5,50),(\"\
  put\",6,60),(\"put\",5,55),(\"put\",7,70),(\"put\",8,80),(\"get\",5),(\"get\",6),(\"\
  get\",8)]) == [55, -1, 80]\nassert lru_trace(2, [(\"get\",9),(\"put\",9,90),(\"\
  get\",9),(\"get\",9),(\"put\",10,100),(\"put\",11,110),(\"get\",9),(\"get\",11)])\
  \ == [-1, 90, 90, -1, 110]\nassert lru_trace(2, [(\"put\",1,1),(\"get\",2),(\"put\"\
  ,3,3),(\"put\",4,4),(\"get\",1),(\"get\",3),(\"get\",4)]) == [-1, -1, 3, 4]\nassert\
  \ lru_trace(3, [(\"put\",1,1),(\"put\",2,2),(\"put\",3,3),(\"put\",2,22),(\"put\"\
  ,4,4),(\"get\",1),(\"get\",2),(\"get\",3),(\"get\",4)]) == [-1, 22, 3, 4]\nimport\
  \ random\nrandom.seed(424242)\n_OPS = []\nfor _i in range(500000):\n    if random.random()\
  \ < 0.5:\n        _OPS.append((\"put\", random.randrange(200000), _i))\n    else:\n\
