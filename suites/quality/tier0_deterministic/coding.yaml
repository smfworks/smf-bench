  language: python
prompt: 'Write a Python function with the exact signature:


  def count_bounded_combinations(coins, target):


  coins is a list of (value, count) tuples: each coin denomination `value` (a positive
  int) may be used at most `count` times (count is an int >= 0). target is an int
  >= 0. Return the number of distinct multisets of coins whose values sum exactly
  to target (order never matters; two multisets differ only if some denomination is
  used a different number of times). An empty coins list can only form target 0. Note
  that summing to 0 is always possible in exactly one way (choose nothing), and a
  denomination with count 0 contributes nothing. Use only the Python standard library.
  Output only a single Python code block.'
