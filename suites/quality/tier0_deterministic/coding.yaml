metadata:
  eval_type: unit_test
  language: python
prompt: 'Write a Python function with the exact signature:


  def tokenize(src: str) -> list[tuple[str, str]]


  Implement a lexer that scans src left to right with MAXIMAL MUNCH and returns a
  list of (kind, lexeme) tuples. Rules, in the order they must be tried at each position:


  1. Whitespace (space, tab, carriage return, newline) is skipped and produces no
  token.

  2. ''#'' starts a comment: skip everything up to (not including) the next newline.

  3. STR: a double-quoted string literal. Inside, the only legal escapes are \" \\
  \n \t (backslash followed by a double quote, a backslash, the letter n, or the letter
  t). Any other character after a backslash must raise ValueError. A string with no
  closing quote must raise ValueError. The lexeme is the RAW source slice including
  both quotes (do not decode escapes).

  4. NUM: starts with an ASCII digit. Grammar: digits, optionally followed by ''.''+digits,
  optionally followed by an exponent (''e'' or ''E'', optional ''+'' or ''-'', then
  digits). Each optional part is consumed ONLY if it is completely valid at that position;
  otherwise it is left for later tokens. So ''1e+5'' is one NUM ''1e+5'', but ''1e+''
  lexes as NUM ''1'' then ID ''e'' then OP ''+'', and ''1.e3'' lexes as NUM ''1''
  then OP ''.'' then ID ''e3'' (the ''.'' is not followed by a digit). Underscores
  are NOT part of numbers: ''1_000'' is NUM ''1'' then ID ''_000''.

  5. ID: [A-Za-z_][A-Za-z0-9_]* (ASCII only).

  6. OP: the two-character operators ** == != <= >= -> are tried first, then the single
  characters + - * / % < > = ( ) , : . So ''x-->y'' lexes as ID, OP ''-'', OP ''->'',
  ID.

  7. Any character that fits no rule raises ValueError.


  Kinds are exactly the strings ''STR'', ''NUM'', ''ID'', ''OP''. src is ASCII, len(src)
  <= 10000.


  Example: tokenize(''x = 1'') == [(''ID'', ''x''), (''OP'', ''=''), (''NUM'', ''1'')].
  Use only the Python standard library. The grader appends hidden asserts to your
  code and runs everything with a hard 10-second limit, so respect the stated complexity
  requirements. Output only a single Python code block.'
