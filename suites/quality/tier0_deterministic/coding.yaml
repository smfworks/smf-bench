metadata:
  eval_type: unit_test
  language: python
prompt: 'Write a Python function min_partition_cost(a: list[int], k: int) -> int.
  Partition the list a (1 <= len(a) <= 500; elements are integers that may be negative,
  |a[i]| <= 10**6) into one or more contiguous non-empty segments covering the whole
  list in order. The cost of a segment is (max(segment) - min(segment)) + k, where
  k (0 <= k <= 10**6) is a fixed per-segment fee added for every segment you create.
  Return the minimum possible total cost over all partitions. Example: for a=[1, 1000000,
  1], k=2 the answer is 6: three single-element segments cost (0+2)+(0+2)+(0+2)=6,
  whereas one big segment costs (999999)+2. Use only the Python standard library;
  an O(n^2) dynamic program is fast enough. Output only a single Python code block.'
