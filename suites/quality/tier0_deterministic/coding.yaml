prompt: 'Write a Python function union_area(rects: list[tuple[int, int, int, int]])
  -> int that returns the exact area of the union of axis-aligned rectangles. Each
  rectangle is given as (x1, y1, x2, y2) with x1 < x2 and y1 < y2, covering the half-open
  region [x1, x2) x [y1, y2). Coordinates are integers with magnitude up to 10**9,
  so filling a unit grid is impossible — use coordinate compression with a sweep,
  or an equivalent exact method. Rectangles may overlap, be nested, be exact duplicates,
