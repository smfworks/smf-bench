temperature: 0.3
evaluator: regex_match
expected: \\boxed\{\s*(?:\\text(?:bf|rm|tt)?\{)?\s*\(?E\)?\s*\}?\s*\}
prompt: 'Consider five basic statements about an incident at a records office:

  S: the archive was sealed.  L: the ledger was copied.  V: the vault stayed open.  C:
  the courier left early.  M: the manifest was signed.

  All of the following premises are true:

  1. If the archive was sealed, then the ledger was copied.

  2. Exactly one of the following two is true: the ledger was copied; the vault stayed
  open.

  3. If the vault stayed open, then the courier left early.

  4. If the courier left early, then the manifest was signed.

  5. The manifest was signed only if the archive was not sealed.

  6. The archive was sealed or the vault stayed open (or both).

  7. The manifest was not signed.

  Exactly one of the following five conclusions is logically entailed by the premises
  (that is, it must be true in every situation consistent with all seven premises):

  A. The vault stayed open.

  B. The courier left early.

  C. The archive was not sealed.

  D. The ledger was not copied.

  E. The archive was sealed.

  Which one is entailed? Give your final answer as exactly one capital letter inside
  \boxed{}, for example \boxed{A}.'
---
